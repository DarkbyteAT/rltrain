name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: lint
            command: ruff check rltrain/ && ruff format --check rltrain/
          - name: typecheck
            command: pyright rltrain/
          - name: test
            command: pytest tests/ -v

    name: ${{ matrix.name }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync --group dev

      - name: ${{ matrix.name }}
        run: uv run ${{ matrix.command }}
